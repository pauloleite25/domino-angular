<section class="hand-panel" [class.can-play]="canInteract" [class.waiting]="!canInteract">
    <div class="hand-header">
        <div class="title-row">
            <h2>{{ playerName }} ({{ playerId }})</h2>
            <span *ngIf="statusLabel" class="status" [class.current]="isCurrentPlayer" [class.next]="isNextPlayer">
                {{ statusLabel }}
            </span>
            <span *ngIf="didAStartRound" class="started">INICIOU</span>
            <span class="human">HUMANO</span>
        </div>

        <div class="count">Jogaveis: <strong>{{ playableCount }}</strong> / {{ hand.length }}</div>
    </div>

    <div class="tiles">
        <button
            *ngFor="let tile of hand"
            type="button"
            class="tile-button"
            [class.playable]="isPlayable(tile)"
            [class.dragging]="draggingTileKey === tileKey(tile)"
            [disabled]="!canInteract || !isPlayable(tile)"
            [class.disabled]="!canInteract || !isPlayable(tile)"
            [attr.draggable]="canInteract && isPlayable(tile) ? true : null"
            (dragstart)="handleDragStart($event, tile)"
            (dragend)="handleDragEnd()"
            (click)="selectTile.emit(tile)">
            <app-domino-tile-visual
                [left]="tile.left"
                [right]="tile.right"
                orientation="vertical"
                [fixedLongSidePx]="tileLongSidePx"
                [selected]="selectedTileKey === tileKey(tile)"
                [playable]="isPlayable(tile)"
                playableStyle="hand"
                [disabled]="!canInteract || !isPlayable(tile)">
            </app-domino-tile-visual>
        </button>
    </div>
</section>
